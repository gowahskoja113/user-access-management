# ==========================================
# 1. TEMPLATES (Cấu hình dùng chung)
# ==========================================
x-db-credentials: &db-credentials
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}

x-networks: &networks
  networks:
    - r2s-network

# ==========================================
# 2. SERVICES
# ==========================================
services:
  # --- Database cho Auth Service ---
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      <<: *db-credentials
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    <<: *networks

  # --- Database cho User Service ---
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      <<: *db-credentials
      POSTGRES_DB: user_db
    ports:
      - "5433:5432" # Máy thật gọi 5433, vào container là 5432
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    <<: *networks

  # --- RabbitMQ (Anh đưa thư) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Cổng kết nối dữ liệu
      - "15672:15672" # Giao diện quản lý (guest/guest)
    <<: *networks

  # --- Auth Service ---
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      - auth-db
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      SPRING_RABBITMQ_HOST: rabbitmq
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "${AUTH_PORT:-8081}:8081"
    <<: *networks

  # --- User Service ---
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      - user-db
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "${USER_PORT:-8082}:8082"
    <<: *networks

# ==========================================
# 3. VOLUMES & NETWORKS
# ==========================================
volumes:
  auth_postgres_data:
    name: auth_postgres_data
  user_postgres_data:
    name: user_postgres_data

networks:
  r2s-network:
    driver: bridge