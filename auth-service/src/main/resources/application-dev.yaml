spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  flyway:
    enabled: true
    mixed: true
    locations: classpath:db/migration/auth
    baseline-on-migrate: true
    table: flyway_schema_history_auth
    group: true

    rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  file:
    path: F:\R2S\user-access-management\auth-service\logs