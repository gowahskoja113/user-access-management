spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_test
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/auth
      - classpath:db/migration/user
    clean-on-validation-error: true

jwt:
  secret: ${JWT_SECRET:my_super_secret_key_for_unit_testing_only_123456_at_least_32_chars}
  expiration: 3600000