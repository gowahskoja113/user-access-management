spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/user-access-management-1
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration/user
    table: flyway_schema_history_user
    baseline-on-migrate: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect