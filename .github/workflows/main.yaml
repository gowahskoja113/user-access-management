name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: 12345678
  # Lưu ý: DB Name nên khớp với URL trong application-test.yaml của bạn
  AUTH_DB: auth_test
  USER_DB: user_test

jobs:
  # 1. BUILD JOB: Đảm bảo build toàn bộ project để tạo ra các artifact (core, auth, user)
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '23' # Nâng lên 23 để đồng bộ với môi trường local của bạn
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant permission for mvnw
        run: chmod +x mvnw

      # Quan trọng: Dùng 'install' để nạp core và auth vào local repo của runner
      - name: Install Project Modules
        run: ./mvnw clean install -DskipTests

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            **/target/*.jar
            !**/target/*-exec.jar

  # 2. TEST JOB: Chạy integration tests với Postgres Service
  test:
    name: Run Service Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant permission for mvnw
        run: chmod +x mvnw

      - name: Create Databases
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          export PGPASSWORD=${{ env.POSTGRES_PASSWORD }}
          psql -h localhost -U ${{ env.POSTGRES_USER }} -d postgres -c "CREATE DATABASE \"${{ env.AUTH_DB }}\";"
          psql -h localhost -U ${{ env.POSTGRES_USER }} -d postgres -c "CREATE DATABASE \"${{ env.USER_DB }}\";"

      # Chạy test từng module. Lưu ý: -Dnet.bytebuddy.experimental=true để hỗ trợ Java 23
      - name: Test Services
        run: |
          ./mvnw test -pl core
          ./mvnw test -pl auth-service
          ./mvnw test -pl user-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/auth_test
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          JWT_SECRET: my_super_secret_key_for_unit_testing_only_123456_at_least_32_chars

  # 3. DEPLOY JOB: (Tạm thời giữ nguyên logic Docker của bạn)
  deploy:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars

      # Tại đây bạn có thể thêm bước Build Docker Image và Push lên Docker Hub/GHCR
      - name: Deployment Note
        run: echo "Artifacts downloaded. Ready for Docker build/push."